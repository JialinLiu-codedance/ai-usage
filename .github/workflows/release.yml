name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Select the semantic version bump for this release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump_version.outputs.version }}
      release_sha: ${{ steps.push_release_commit.outputs.release_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Ensure release runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error title=Unsupported branch::请从 main 分支手动触发 release workflow。"
            exit 1
          fi

      - id: bump_version
        name: Bump app version
        env:
          BUMP_KIND: ${{ inputs.bump }}
        run: |
          node scripts/release/bump-version.mjs "${BUMP_KIND}"
          VERSION=$(node scripts/ci/read-app-version.mjs)
          node scripts/ci/check-version-sync.mjs
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure release version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.bump_version.outputs.version }}
        run: |
          if gh release view "v${APP_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "::error title=Version already released::v${APP_VERSION} 已存在。请重新触发 release，并选择下一个版本号。"
            exit 1
          fi

      - id: push_release_commit
        name: Commit and push release version
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          VERSION="${{ steps.bump_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "core:bump version to ${VERSION}"
          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run frontend tests
        run: node --test tests/*.test.ts

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build frontend
        run: npm run build

  publish:
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: AI Usage v__VERSION__
          releaseBody: |
            Automated release for AI Usage.

            See the attached assets for the macOS installers and updater bundles.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          args: --target ${{ matrix.target }}
